name: Upload Shabad Sojhi to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shabad-sojhi-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-26
    environment: testflight
    defaults:
      run:
        working-directory: gurbani-reader-app
    env:
      IOS_BUNDLE_ID: com.drbigbeard.shabadsojhi
      ARCHIVE_PATH: ${{ runner.temp }}/ShabadSojhi.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/ShabadSojhiExport
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gurbani-reader-app/package-lock.json

      - name: Require Apple's current upload toolchain
        run: |
          xcodebuild -version
          XCODE_MAJOR="$(xcodebuild -version | awk '/Xcode/ { split($2, version, "."); print version[1] }')"
          test "$XCODE_MAJOR" -ge 26 || {
            echo "::error::Apple requires App Store Connect uploads to use Xcode 26 or later."
            exit 1
          }

      - name: Validate required TestFlight secrets
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          for name in \
            APPLE_DISTRIBUTION_CERTIFICATE_BASE64 \
            APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD \
            APPLE_PROVISIONING_PROFILE_BASE64 \
            APPLE_TEAM_ID \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_PRIVATE_KEY_BASE64
          do
            test -n "${!name}" || {
              echo "::error::Missing GitHub environment secret: ${name}"
              exit 1
            }
          done

      - run: npm ci
      - name: Restore checksummed v5 base reading database
        run: npm run corpus:restore
      - name: Fetch and verify the approved BaniDB source snapshot
        env:
          SNAPSHOT_GENERATED_AT: 2026-07-19T00:00:00.000Z
          EXPECTED_SNAPSHOT_SHA256: e49b1f372aa59e59cb8ba0a9a5c97d72491fe58089ad43d7148416aaf6886f38
        run: npm run data:fetch-v013 -- "$RUNNER_TEMP/v013-banidb-snapshot"
      - name: Build the current reading database
        run: |
          npm run data:upgrade-v6 -- public/assets/databases/gurbani_reader_v5SQLite.db public/assets/databases/gurbani_reader_v6SQLite.db "$RUNNER_TEMP/v013-banidb-snapshot"
          npm run data:upgrade-v7 -- public/assets/databases/gurbani_reader_v6SQLite.db public/assets/databases/gurbani_reader_v7SQLite.db
          npm run data:upgrade-v8 -- public/assets/databases/gurbani_reader_v7SQLite.db public/assets/databases/gurbani_reader_v8SQLite.db
      - run: npm run audit:rc
      - run: npm run ios:prepare
      - run: npm run ios:audit

      - name: Install Apple distribution signing material
        id: signing
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/shabad-sojhi.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/testflight-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          printf '%s' "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST")"
          PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST")"

          test "$PROFILE_TEAM_ID" = "$APPLE_TEAM_ID" || {
            echo "::error::Provisioning profile belongs to team $PROFILE_TEAM_ID, not $APPLE_TEAM_ID"
            exit 1
          }
          test "$PROFILE_APP_ID" = "$APPLE_TEAM_ID.$IOS_BUNDLE_ID" || {
            echo "::error::Provisioning profile is for $PROFILE_APP_ID, not $APPLE_TEAM_ID.$IOS_BUNDLE_ID"
            exit 1
          }

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Archive signed iOS application
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY='Apple Distribution' \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            clean archive

      - name: Export signed IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
        run: |
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          python3 - "$EXPORT_OPTIONS" "$APPLE_TEAM_ID" "$IOS_BUNDLE_ID" "$PROFILE_NAME" <<'PY'
          import plistlib
          import sys

          path, team_id, bundle_id, profile_name = sys.argv[1:]
          options = {
              "method": "app-store-connect",
              "destination": "export",
              "signingStyle": "manual",
              "teamID": team_id,
              "stripSwiftSymbols": True,
              "uploadSymbols": True,
              "provisioningProfiles": {bundle_id: profile_name},
          }
          with open(path, "wb") as handle:
              plistlib.dump(options, handle)
          PY

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS"
          test -f "$EXPORT_PATH/App.ipa"

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          PRIVATE_KEY_DIRECTORY="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$PRIVATE_KEY_DIRECTORY"
          PRIVATE_KEY_PATH="$PRIVATE_KEY_DIRECTORY/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 -D > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$EXPORT_PATH/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Remove temporary signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/testflight-signing.keychain-db" 2>/dev/null || true
          rm -rf "$HOME/.appstoreconnect/private_keys"
