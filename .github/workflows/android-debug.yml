name: Build Android release input

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gurbani-reader-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gurbani-reader-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Restore versioned reading database
        run: npm run corpus:restore
      - run: npm ci
      - run: npm run check
      - run: npm run audit:rc
      - run: npm run build:native
      - run: npx cap sync android
      - run: ./gradlew assembleRelease
        working-directory: gurbani-reader-app/android
      - name: Label unsigned build input
        run: cp android/app/build/outputs/apk/release/app-release-unsigned.apk Gurbani-Reader-v0.11-rc1-unsigned-do-not-install.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Gurbani-Reader-v0.11-rc1-unsigned-build-input
          path: gurbani-reader-app/Gurbani-Reader-v0.11-rc1-unsigned-do-not-install.apk
          if-no-files-found: error
      - name: Publish unsigned build input for private-key signing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.11.0-rc.1
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --prerelease --title "Gurbani Reader v0.11 RC 1" --notes "Automated Android build input. Do not install the unsigned asset; use the separately signed and verified APK supplied from the release process."
          gh release upload "$TAG" Gurbani-Reader-v0.11-rc1-unsigned-do-not-install.apk --clobber
