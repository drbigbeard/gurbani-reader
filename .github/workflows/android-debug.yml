name: Build installable Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gurbani-reader-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gurbani-reader-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Preserve the private local-install signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: gurbani-reader-local-signing-v1
      - name: Restore versioned reading database
        run: npm run corpus:restore
      - run: npm ci
      - run: npm run check
      - run: npm run audit:rc
      - run: npm run build:native
      - run: npx cap sync android
      - run: ./gradlew assembleDebug
        working-directory: gurbani-reader-app/android
      - name: Verify signing and 16 KB alignment
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          ZIPALIGN="$(find "$SDK_ROOT/build-tools" -type f -name zipalign -print | sort -V | tail -n 1)"
          APKSIGNER="$(find "$SDK_ROOT/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
          test -n "$ZIPALIGN"
          test -x "$ZIPALIGN"
          test -n "$APKSIGNER"
          test -x "$APKSIGNER"
          "$ZIPALIGN" -c -P 16 -v 4 \
            android/app/build/outputs/apk/debug/app-debug.apk
          "$APKSIGNER" verify --verbose --print-certs \
            android/app/build/outputs/apk/debug/app-debug.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            Gurbani-Reader-v0.12.0-rc1-Android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Gurbani-Reader-v0.12.0-rc1-Android
          path: gurbani-reader-app/Gurbani-Reader-v0.12.0-rc1-Android.apk
          if-no-files-found: error
      - name: Publish installable APK
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.12.0-rc.1
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --prerelease --title "Gurbani Reader v0.12 RC 1" --notes-file ../RELEASE_NOTES_v0.12-rc1.md
          gh release upload "$TAG" Gurbani-Reader-v0.12.0-rc1-Android.apk --clobber
