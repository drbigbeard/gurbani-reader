name: Build installable Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gurbani-reader-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gurbani-reader-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Preserve the private local-install signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: gurbani-reader-local-signing-v1
          save-always: true
      - name: Create the permanent local-install signing key when first needed
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          if [[ ! -f "$HOME/.android/debug.keystore" ]]; then
            keytool -genkeypair \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -dname "CN=Gurbani Reader Local Install,O=Gurbani Reader,C=GB" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
          fi
      - run: npm ci
      - name: Restore checksummed v5 base reading database
        run: npm run corpus:restore
      - name: Fetch and verify the v0.13 BaniDB source snapshot
        env:
          SNAPSHOT_GENERATED_AT: 2026-07-16T20:21:19.365Z
          EXPECTED_SNAPSHOT_SHA256: 4e2acb1ed189e79053d0a71ccd8df5cfd162a0e9d15b587d519895e8a7372d77
        run: npm run data:fetch-v013 -- "$RUNNER_TEMP/v013-banidb-snapshot"
      - name: Build the v6 reading database from verified sources
        run: npm run data:upgrade-v6 -- public/assets/databases/gurbani_reader_v5SQLite.db public/assets/databases/gurbani_reader_v6SQLite.db "$RUNNER_TEMP/v013-banidb-snapshot"
      - run: npm run check
      - run: npm run audit:rc
      - run: npm run build:native
      - run: npx cap sync android
      - run: ./gradlew assembleDebug
        working-directory: gurbani-reader-app/android
      - name: Align, sign and verify the installable APK
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          ZIPALIGN="$(find "$SDK_ROOT/build-tools" -type f -name zipalign -print | sort -V | tail -n 1)"
          APKSIGNER="$(find "$SDK_ROOT/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
          test -x "$ZIPALIGN"
          test -x "$APKSIGNER"
          test -f "$HOME/.android/debug.keystore"
          "$ZIPALIGN" -P 16 -f 4 \
            android/app/build/outputs/apk/debug/app-debug.apk \
            Gurbani-Reader-v0.13.0-rc1-aligned.apk
          "$APKSIGNER" sign \
            --ks "$HOME/.android/debug.keystore" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out Gurbani-Reader-v0.13.0-rc1-Android.apk \
            Gurbani-Reader-v0.13.0-rc1-aligned.apk
          "$ZIPALIGN" -c -P 16 -v 4 Gurbani-Reader-v0.13.0-rc1-Android.apk
          "$APKSIGNER" verify --verbose --print-certs Gurbani-Reader-v0.13.0-rc1-Android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Gurbani-Reader-v0.13.0-rc1-Android
          path: gurbani-reader-app/Gurbani-Reader-v0.13.0-rc1-Android.apk
          if-no-files-found: error
      - name: Publish installable APK
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.13.0-rc.1
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --prerelease --title "Gurbani Reader v0.13 RC 1" --notes-file ../RELEASE_NOTES_v0.13-rc1.md
          gh release upload "$TAG" Gurbani-Reader-v0.13.0-rc1-Android.apk --clobber
