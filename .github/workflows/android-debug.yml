name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gurbani-reader-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gurbani-reader-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Restore versioned reading database
        run: npm run corpus:restore
      - run: npm ci
      - run: npm run check
      - run: npm run build:native
      - run: npx cap sync android
      - run: ./gradlew assembleDebug
        working-directory: gurbani-reader-app/android
      - uses: actions/upload-artifact@v4
        with:
          name: Gurbani-Reader-v0.10.0-alpha.1-debug-apk
          path: gurbani-reader-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
