name: Build Android release input

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gurbani-reader-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gurbani-reader-app/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Restore versioned reading database
        run: npm run corpus:restore
      - run: npm ci
      - run: npm run check
      - run: npm run audit:rc
      - run: npm run build:native
      - run: npx cap sync android
      - run: ./gradlew assembleRelease
        working-directory: gurbani-reader-app/android
      - name: Align unsigned APK for 16 KB Android devices
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          ZIPALIGN="$(find "$SDK_ROOT/build-tools" -type f -name zipalign -print | sort -V | tail -n 1)"
          test -n "$ZIPALIGN"
          test -x "$ZIPALIGN"
          "$ZIPALIGN" -P 16 -f -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            Gurbani-Reader-v0.11-rc3-aligned-unsigned-do-not-install.apk
          "$ZIPALIGN" -c -P 16 -v 4 \
            Gurbani-Reader-v0.11-rc3-aligned-unsigned-do-not-install.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Gurbani-Reader-v0.11-rc3-aligned-unsigned-build-input
          path: gurbani-reader-app/Gurbani-Reader-v0.11-rc3-aligned-unsigned-do-not-install.apk
          if-no-files-found: error
      - name: Publish unsigned build input for private-key signing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.11.0-rc.3
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --prerelease --title "Gurbani Reader v0.11 RC 3" --notes "Inline TGGSP Translation, etymology, named-Bani crosswalks and ordered ceremony readings. The automated asset is unsigned; use the separately signed and verified APK supplied from the release process."
          gh release upload "$TAG" Gurbani-Reader-v0.11-rc3-aligned-unsigned-do-not-install.apk --clobber
